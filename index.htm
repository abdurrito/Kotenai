<!DOCTYPE html>

<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для самой прекрасной ❤️</title>

<link rel="stylesheet" href="kotik.css">

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac,#ffc3a0);
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

/* карточка */

.card{
background:rgba(255,255,255,0.15);
padding:45px;
border-radius:25px;
backdrop-filter:blur(12px);
z-index:2;
max-width:420px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
}

/* заголовок */

h1{
font-size:38px;
margin-bottom:20px;
}

/* кнопка */

button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:14px;
cursor:pointer;
background:white;
color:#ff4d6d;
margin-top:10px;
transition:0.3s;
}

button:hover{
transform:scale(1.15);
}

/* большое сообщение */

.bigMessage{
font-size:28px;
margin-top:20px;
font-weight:bold;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0; transform:scale(0.8);}
to{opacity:1; transform:scale(1);}
}

/* летающие сердечки */

.floating{
position:absolute;
bottom:-50px;
font-size:26px;
animation:floatUp linear infinite;
}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}

</style>

</head>

<body>

<div class="flowersLeft">
🌸
🌺
🌷
💐
🌼
</div>

<div class="flowersRight">
🌸
🌷
🌺
💐
🌼
</div>

<div class="card">

<img src="mydi.png" class="photo">

<h1>🌸 С 8 Марта 🌸</h1>

<p>
В этот прекрасный день именно ты делаешь мир вокруг красивее жаным 🌷
</p>

<button id="loveButton" onclick="love()">Нажми 💌</button>

<div id="message" style="display:none;"></div>

</div>

<script>

function love(){

let msg = document.getElementById("message");
let btn = document.getElementById("loveButton");

btn.style.display = "none";

msg.style.display = "block";

msg.innerHTML =
"<div class='bigMessage'>жаным, кошаканым 💖<br>С праздником, с 8 марта тебя!</div>";

}

/* сердечки и цветы */

function create(){

const el=document.createElement("div");

const items=["❤️","💖","🌸","🌷","💐","🌺"];

el.innerHTML=items[Math.floor(Math.random()*items.length)];

el.className="floating";

el.style.left=Math.random()*100+"vw";

el.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(el);

setTimeout(()=>{el.remove()},8000);

}

setInterval(create,300);

</script>

</body>
</html>
