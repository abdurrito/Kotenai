<!DOCTYPE html>

<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Для тебя ❤️</title>

<link rel="stylesheet" href="kotik.css">

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:Arial;
background:linear-gradient(135deg,#ff6a88,#ff99ac,#ffc3a0);
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
transition:0.5s;
}

/* затемнение */

.dark{
background:linear-gradient(135deg,#1a1a1a,#2b2b2b);
}

/* карточка */

.card{
background:rgba(255,255,255,0.15);
padding:45px;
border-radius:25px;
backdrop-filter:blur(12px);
z-index:2;
max-width:420px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
transition:0.5s;
}

/* фото */

.photo{
width:100%;
max-width:220px;
border-radius:20px;
margin-bottom:20px;
transition:0.5s;
}

.photo.big{
transform:scale(1.15);
}

/* кнопка */

button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:14px;
cursor:pointer;
background:white;
color:#ff4d6d;
margin-top:10px;
transition:0.3s;
}

button:hover{
transform:scale(1.15);
}

/* текст */

.bigMessage{
font-size:30px;
margin-top:20px;
font-weight:bold;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0; transform:scale(0.7);}
to{opacity:1; transform:scale(1);}
}

/* сердечки */

.floating{
position:absolute;
font-size:26px;
animation:floatUp linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-110vh);opacity:0;}
}

</style>

</head>

<body>

<div class="flowersLeft">🌸 🌺 🌷 💐 🌼</div>
<div class="flowersRight">🌸 🌷 🌺 💐 🌼</div>

<div class="card">

<img src="mydi.png" class="photo" id="photo">

<h1>🌸 Для тебя 🌸</h1>

<p>
Просто хотел сказать,<br>
что ты очень особенная для меня 💖<br>
С тобой всё становится лучше.
</p>

<button id="btn" onclick="love()">Нажми 💌</button>

<div id="message" style="display:none;"></div>

</div>

<script>

function love(){

let msg = document.getElementById("message");
let btn = document.getElementById("btn");
let photo = document.getElementById("photo");

/* исчезает кнопка */
btn.style.display="none";

/* затемняется фон */
document.body.classList.add("dark");

/* увеличивается фото */
photo.classList.add("big");

/* показывается текст */
msg.style.display="block";

msg.innerHTML =
"<div class='bigMessage'>жаным, кошаканым 💖<br>Мне правда очень хорошо с тобой ❤️</div>";

/* взрыв сердечек */
for(let i=0;i<40;i++){
createBurst();
}

}

/* обычные сердечки */

function create(){

const el=document.createElement("div");

const items=["❤️","💖","🌸","🌷"];

el.innerHTML=items[Math.floor(Math.random()*items.length)];

el.className="floating";

el.style.left=Math.random()*100+"vw";
el.style.bottom="-20px";
el.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(el);

setTimeout(()=>el.remove(),8000);
}

setInterval(create,400);

/* взрыв */

function createBurst(){

const el=document.createElement("div");

el.innerHTML="💖";

el.style.position="absolute";
el.style.left="50%";
el.style.top="50%";
el.style.fontSize="30px";

const x=(Math.random()-0.5)*500;
const y=(Math.random()-0.5)*500;

el.style.transform=`translate(${x}px,${y}px)`;

el.style.transition="1s";

document.body.appendChild(el);

setTimeout(()=>el.remove(),1000);
}

</script>

</body>
</html>
